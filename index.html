<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="FashionHub — a modern fashion retail prototype for clothing, shoes, and accessories. (UX/UI prototype only.)" />
  <title>FashionHub — Clothing, Shoes & Accessories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>" />
  <!-- Adobe Experience Platform Web SDK / Launch (analytics tag) -->
  <script src="https://assets.adobedtm.com/d4b7d80f6e21/bb3647ac02a0/launch-5722a60f3f47.min.js" async></script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <!-- Announcement bar -->
  <div class="announcement" role="region" aria-label="Store announcement">
    ✨ <strong>Summer Sale</strong> — Up to 60% off + <strong>Free Shipping</strong> on orders over $50
  </div>

  <!-- Header -->
  <header class="site" id="site-header"><!-- rendered by app.js --></header>

  <!-- Main app content -->
  <main id="main" tabindex="-1"><!-- rendered by app.js --></main>

  <!-- Footer -->
  <footer class="site" id="site-footer"><!-- rendered by app.js --></footer>

  <!-- Mobile nav drawer -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <aside class="drawer" id="drawer" aria-label="Mobile navigation" aria-hidden="true"><!-- rendered by app.js --></aside>

  <!-- Toast host -->
  <div class="toast-wrap" id="toast-wrap" aria-live="polite" aria-atomic="true"></div>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
